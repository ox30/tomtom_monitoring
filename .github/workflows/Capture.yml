name: TomTom Traffic Capture (Vector Flow)

on:
  workflow_dispatch:
    inputs:
      interval:
        description: 'Intervalle entre les captures (secondes)'
        required: false
        default: '600'
      cycles:
        description: 'Nombre de cycles'
        required: false
        default: '36'
  schedule:
    - cron: '0 0,6,12,18 * * *'

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Vérifier les fichiers requis
        run: |
          if [ ! -f capture.py ]; then
            echo "✗ capture.py introuvable dans le repo !"
            exit 1
          fi

      - name: Préparer branche captures
        run: |
          cp capture.py /tmp/capture.py
          cp requirements.txt /tmp/requirements.txt 2>/dev/null || true

          git fetch origin captures || true
          if git rev-parse --verify origin/captures >/dev/null 2>&1; then
            git checkout captures
          else
            git checkout -b captures
          fi

          cp /tmp/capture.py capture.py
          cp /tmp/requirements.txt requirements.txt 2>/dev/null || true
          echo "✓ capture.py présent sur la branche captures"

      - name: Boucle de capture
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: |
          INTERVAL=${{ github.event.inputs.interval || '600' }}
          CYCLES=${{ github.event.inputs.cycles || '36' }}

          echo "═══ Démarrage: ${CYCLES} cycles, intervalle ${INTERVAL}s ═══"

          for CYCLE in $(seq 1 $CYCLES); do
            echo ""
            echo "──── Cycle ${CYCLE}/${CYCLES} — $(date -u '+%H:%M UTC') ────"
            
            python capture.py || echo "⚠ Erreur cycle ${CYCLE}"

            git add -A captures/ .base-cache/ capture.py
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "📸 ${TIMESTAMP}" --allow-empty || true
            git push origin captures || true

            if [ "$CYCLE" -lt "$CYCLES" ]; then
              echo "⏳ Prochain cycle dans ${INTERVAL}s..."
              sleep $INTERVAL
            fi
          done

          echo ""
          echo "═══ Boucle terminée après ${CYCLES} cycles ═══"
