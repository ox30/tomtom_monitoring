name: TomTom Traffic Capture (API)

on:
  schedule:
    # Relance la boucle si elle s'est terminée (sécurité)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      interval:
        description: "Intervalle entre captures (minutes)"
        required: false
        default: "10"
        type: string

# Un seul job à la fois
concurrency:
  group: tomtom-capture
  cancel-in-progress: false

jobs:
  capture-loop:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code (main)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Restaurer les captures existantes
        run: |
          git fetch origin captures --depth=1 2>/dev/null && \
          git checkout origin/captures -- captures/ 2>/dev/null && \
          echo "✓ Captures précédentes restaurées" || \
          echo "→ Première exécution — pas de captures précédentes"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests Pillow

      - name: Boucle de capture
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
          INTERVAL_MIN: ${{ github.event.inputs.interval || '10' }}
        run: |
          set -euo pipefail

          # ── Configuration ──────────────────────────────────────
          MAX_RUNTIME=20700   # 5h 45min (limite GitHub = 6h)
          INTERVAL=$((INTERVAL_MIN * 60))
          START_TIME=$(date +%s)
          CYCLE=0

          # ── Préparation git ────────────────────────────────────
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout --orphan captures-work
          git rm -rf --cached . -q 2>/dev/null || true

          # README pour la branche captures
          cat > README.md << 'EOF'
          # Captures TomTom — Trafic A13 (Grisons)

          Captures automatiques via **API TomTom** (tuiles raster) toutes les ~10 minutes.
          Fuseau horaire : **Europe/Zurich** (CET/CEST).

          ## Méthode

          Chaque capture superpose 3 couches de tuiles :
          1. **Carte de base** (Map Display API)
          2. **Traffic Flow** — vitesse relative sur les segments routiers
          3. **Traffic Incidents** — bouchons et incidents

          ## Télécharger

          | Quoi | Comment |
          |---|---|
          | **Une capture** | Naviguer dans les dossiers → clic sur l'image → **Download** |
          | **Tout (ZIP)** | [📦 Télécharger le ZIP](https://github.com/ox30/tomtom_monitoring_a13-a2/archive/refs/heads/captures.zip) |

          ## Structure

          ```
          captures/
            2026-03-28/
              zone_A13_Chur/
                2026-03-28-0830_zone_A13_Chur.jpg
                2026-03-28-0840_zone_A13_Chur.jpg
                ...
              zone_Chur_Isla-T/
                ...
              zone_globale_A2_A13/
                ...
            2026-03-29/
              ...
          ```

          ## Zones capturées

          | Zone | Couverture | Zoom |
          |---|---|---|
          | `zone_globale_A2_A13` | Vue d'ensemble A2–A13 | 9 |
          | `zone_A13_Chur` | Secteur A13 autour de Chur | 10 |
          | `zone_Chur_Isla-T` | Détail Chur – Isla/Thusis | 12 |

          ## Budget API

          - ~108 tuiles par capture (3 zones × 3 couches × ~12 tuiles)
          - ~15'500 tuiles/jour (quota gratuit : 50'000/jour)
          - Tuiles de base cachées (ne changent pas dans la journée)

          ## Rétention

          Les captures de plus de **7 jours** sont automatiquement supprimées.
          EOF

          sed -i 's/^          //' README.md

          git add captures/ README.md 2>/dev/null || true
          git commit --allow-empty -m "captures init"

          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║  TomTom API Capture — intervalle : ${INTERVAL_MIN} min          ║"
          echo "║  Budget : ~15'500 tuiles/jour (quota : 50'000)       ║"
          echo "║  Durée max : ~5h45 — puis relance automatique        ║"
          echo "╚════════════════════════════════════════════════════════╝"
          echo ""

          # ── Boucle principale ──────────────────────────────────
          while true; do
            CYCLE_START=$(date +%s)
            CYCLE=$((CYCLE + 1))

            ELAPSED=$((CYCLE_START - START_TIME))
            if [ "$ELAPSED" -ge "$MAX_RUNTIME" ]; then
              echo ""
              echo "⏱ Durée max atteinte (${ELAPSED}s) — fin de la boucle"
              echo "  Le prochain run cron prendra le relais."
              break
            fi

            REMAINING=$(( (MAX_RUNTIME - ELAPSED) / 60 ))
            echo ""
            echo "━━━ Cycle #${CYCLE} — $(TZ=Europe/Zurich date '+%H:%M %Z') — ${REMAINING} min restantes ━━━"

            # Exécuter les captures
            python capture.py || echo "⚠ Erreur capture (cycle continue)"

            # Commit + push (amend = toujours un seul commit)
            git add captures/ README.md
            git commit --amend --allow-empty -m "captures $(date -u '+%Y-%m-%d %H:%M') UTC" -q
            git push --force origin captures-work:captures -q
            echo "✓ Push OK"

            # Temps de sommeil
            CYCLE_END=$(date +%s)
            CYCLE_DURATION=$((CYCLE_END - CYCLE_START))
            SLEEP_TIME=$((INTERVAL - CYCLE_DURATION))

            if [ "$SLEEP_TIME" -gt 0 ]; then
              echo "💤 Prochain cycle dans ${SLEEP_TIME}s (capture: ${CYCLE_DURATION}s)"
              sleep "$SLEEP_TIME"
            else
              echo "⚠ Cycle a pris ${CYCLE_DURATION}s (> ${INTERVAL}s) — enchaîne immédiatement"
            fi
          done

          echo ""
          echo "═══ Boucle terminée après ${CYCLE} cycles ═══"
